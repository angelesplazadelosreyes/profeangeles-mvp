<header class="site-header">
  <nav class="container nav" aria-label="Navegación principal">
    <a class="brand" href="/">
      <span class="brand-mark">{A}</span>
      <span class="brand-text">Profe Ángeles</span>
    </a>

    <button class="nav-toggle" aria-expanded="false" aria-controls="main-menu" aria-label="Abrir menú">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>

    <ul class="menu" id="main-menu" role="list">
      <li><a href="/">Inicio</a></li>

      <li class="menu-dropdown">
        <button class="menu-link" type="button" data-menu="exercises" aria-haspopup="true">
          Ejercicios <span class="caret">▾</span>
        </button>
        <ul class="dropdown" role="list">
          <li><a href="/exercises.html">Generador</a></li>
          <li><a href="/guides.html">Guías PDF</a></li>
        </ul>
      </li>

      <li><a href="/games.html" class="menu-link">Juegos</a></li>

      <li class="menu-dropdown">
        <button class="menu-link" type="button" data-menu="services" aria-haspopup="true">
          Servicios <span class="caret">▾</span>
        </button>
        <ul class="dropdown" role="list">
          <li><a href="/classes.html">Clases</a></li>
          <li><a href="/services-dev.html">Soluciones informáticas</a></li>
        </ul>
      </li>

      <li>
        <button class="btn-login" disabled aria-disabled="true" title="Próximamente">
          Inicio sesión
        </button>
      </li>
    </ul>
  </nav>
</header>

<script>
  (function () {
    const toggle = document.querySelector('.nav-toggle');
    const menu   = document.getElementById('main-menu');
    if (!toggle || !menu) return;

    toggle.addEventListener('click', function () {
      const open = menu.classList.toggle('menu-open');
      toggle.setAttribute('aria-expanded', open);
      toggle.classList.toggle('nav-toggle--open', open);
    });

    // Cierra el menú si se hace clic fuera
    document.addEventListener('click', function (e) {
      if (!e.target.closest('.nav')) {
        menu.classList.remove('menu-open');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.classList.remove('nav-toggle--open');
      }
    });
  })();
</script>
