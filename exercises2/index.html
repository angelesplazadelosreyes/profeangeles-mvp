<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Profe Ángeles · Ejercicios (playground)</title>

  <link rel="icon" href="/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles/styles.css"/>
  <link rel="stylesheet" href="/styles/exercises.css"/>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script defer id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <meta property="og:title" content="ProfeÁngeles - Ejercicios"/>
  <meta property="og:description" content="Genera ejercicios y revisa soluciones guiadas."/>
  <meta property="og:image" content="/og-image.png"/>
  <meta property="og:type" content="website"/>
</head>

<body>
  <div data-include="header"></div>

  <main class="container" id="main-content">
    <button class="sidebar-toggle" id="toggle-subjects" aria-controls="subjects" aria-expanded="false">Materias</button>

    <div class="exercises-layout">
      <aside class="sidebar" id="sidebar" aria-label="Materias">
        <div class="sidebar-header">MATERIAS</div>
        <ul class="subjects" id="subjects">
          <li class="subjects__item" tabindex="0" aria-current="page" data-subject="Matemáticas">
            <span class="subjects__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="3"/></svg></span>
            <span class="subjects__label">Matemáticas</span>
          </li>
          <li class="subjects__item" tabindex="0" aria-disabled="true" title="Próximamente" data-subject="Química">
            <span class="subjects__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="3"/></svg></span>
            <span class="subjects__label">Química <span class="subjects__soon">(próximamente)</span></span>
          </li>
          <li class="subjects__item" tabindex="0" aria-disabled="true" title="Próximamente" data-subject="Biología">
            <span class="subjects__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="3"/></svg></span>
            <span class="subjects__label">Biología <span class="subjects__soon">(próximamente)</span></span>
          </li>
          <li class="subjects__item" tabindex="0" aria-disabled="true" title="Próximamente" data-subject="Física">
            <span class="subjects__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="3"/></svg></span>
            <span class="subjects__label">Física <span class="subjects__soon">(próximamente)</span></span>
          </li>
        </ul>
      </aside>

      <div class="panel">
        <section class="card-header" aria-live="polite">
          <span class="subject-icon-header" aria-hidden="true"></span>
          <h2 id="exercise-title">Generador de ejercicios de <span id="subject-name">Matemáticas</span></h2>
        </section>

        <section class="card-block">
          <div class="filters">
            <label>Tema: <select id="tema"></select></label>
            <label>Subtema: <select id="subtema"></select></label>
            <label>Tipo: <select id="tipo"></select></label>
          </div>

          <div class="actions">
            <button class="btn btn-primary" id="btn-nuevo">Nuevo ejercicio</button>
            <button class="btn btn-primary" id="btn-mostrar">Mostrar respuesta</button>
          </div>

          <div class="math-block">
            <h3>Enunciado</h3>
            <div id="enunciado" class="mathjax"></div>
          </div>

          <!-- ======= SOLUCIÓN (contenedor rojo conceptual) ======= -->
          <section class="solution-wrapper">
            <h3 class="solution-title">Solución</h3>

            <!-- Bloque A (celeste): gráfico + análisis principal -->
            <div class="solution-row">
              <div class="solution-col">
                <h4 class="solution-subtitle">Análisis del gráfico</h4>
                <div class="chart-wrap">
                  <canvas id="grafico" class="chart" height="300"></canvas>
                </div>
                <div id="sol-graph-note" class="mathjax"></div>
              </div>

              <div class="solution-col">
                <h4 class="solution-subtitle">Análisis de la función</h4>
                <div id="sol-primaria" class="mathjax"></div>
              </div>
            </div>

            <!-- Bloque B (celeste): dominio/recorrido + formas -->
            <div class="solution-row">
              <div class="solution-col">
                <h4 class="solution-subtitle">Dominio y Recorrido</h4>
                <div id="sol-domran" class="mathjax"></div>
              </div>

              <div class="solution-col">
                <h4 class="solution-subtitle">Formas</h4>
                <div id="sol-formas" class="mathjax"></div>
              </div>
            </div>

            <!-- Bloque C (opcional): inversa -->
            <div class="solution-row optional" id="inverse-block" hidden>
              <div class="solution-col">
                <h4 class="solution-subtitle">Función inversa</h4>
                <div id="sol-inversa" class="mathjax"></div>
              </div>
            </div>

          </section>
        </section>
      </div>
    </div>
  </main>

  <div data-include="footer"></div>

  <script type="module" src="/scripts/partials.js?v=3"></script>
  <script type="module" src="/scripts/api2.js?v=3"></script>
  <script type="module" src="/scripts/main2.js?v=4"></script>
</body>
</html>
